name: firmware

on:
  push:
    branches: [main]
    tags: ['firmware-v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Cross-compile the firmware for the XIAO ESP32-S3 and produce the app image.
  firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware
    steps:
      - uses: actions/checkout@v4

      - name: Install the esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true

      - name: Install espflash
        run: cargo install espflash --locked

      - name: Build (release)
        run: cargo build --release

      - name: Save app image
        run: |
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/pithddu pithddu-xiao_s3.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-xiao_s3
          path: firmware/pithddu-xiao_s3.bin
          if-no-files-found: error

  release:
    needs: [firmware]
    if: startsWith(github.ref, 'refs/tags/firmware-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish firmware release
        uses: softprops/action-gh-release@v2
        with:
          # Bare per-board app image the dashboard installs by board name.
          files: dist/**/*.bin
          generate_release_notes: true
          fail_on_unmatched_files: true
